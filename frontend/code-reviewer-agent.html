<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeLens — Reverse Engineering Review Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --surface: #0e1420;
    --surface2: #151c2c;
    --border: #1e2d47;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --accent3: #00ff9d;
    --warn: #ff6b35;
    --text: #e2eaf7;
    --muted: #5a7090;
    --danger: #ff4d6d;
    --success: #00ff9d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.one { background: rgba(0,212,255,0.06); top: -200px; right: -100px; }
  .glow-orb.two { background: rgba(123,97,255,0.06); bottom: -200px; left: -100px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* Config bar */
  .config-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 28px 0 0;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .config-bar label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .config-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-input:focus { border-color: var(--accent); }
  .config-input::placeholder { color: var(--muted); }

  .config-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
    padding-bottom: 40px;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Language selector */
  .lang-tabs {
    display: flex;
    gap: 6px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .lang-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .lang-tab:hover { border-color: var(--accent); color: var(--accent); }

  .lang-tab.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    margin: 14px 18px 8px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.04);
  }

  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone p { font-size: 13px; color: var(--muted); }
  .upload-zone p span { color: var(--accent); font-weight: 600; }
  .upload-zone .file-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
    margin-top: 6px;
  }

  /* Code textarea */
  .code-area {
    width: 100%;
    min-height: 260px;
    background: var(--surface2);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 16px 18px;
    resize: vertical;
    outline: none;
  }

  .code-area::placeholder { color: var(--muted); }

  /* Analyze button */
  .analyze-btn {
    width: calc(100% - 36px);
    margin: 14px 18px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,212,255,0.3); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .analyze-btn .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .analyze-btn.loading .spinner { display: block; }
  .analyze-btn.loading .btn-text { opacity: 0.7; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output panel */
  .output-panel {
    grid-column: 1 / -1;
    display: none;
  }

  .output-panel.visible { display: block; }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 14px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-icon { font-size: 15px; }

  /* Tab content */
  .tab-content { display: none; padding: 24px; }
  .tab-content.active { display: block; }

  /* Section cards */
  .section-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .section-card h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-card p, .section-card li {
    font-size: 14px;
    line-height: 1.7;
    color: #b0c4de;
    font-family: 'JetBrains Mono', monospace;
  }

  .section-card ul { padding-left: 18px; }
  .section-card li { margin-bottom: 6px; }

  /* Severity badges */
  .badge-high { color: var(--danger); }
  .badge-med { color: var(--warn); }
  .badge-low { color: var(--accent3); }

  /* Metric chips */
  .metrics-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .metric-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }

  .metric-chip .value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .metric-chip .label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .metric-chip.cyan .value { color: var(--accent); }
  .metric-chip.purple .value { color: var(--accent2); }
  .metric-chip.green .value { color: var(--accent3); }
  .metric-chip.red .value { color: var(--danger); }
  .metric-chip.orange .value { color: var(--warn); }

  /* Code block */
  .code-block {
    background: #060a10;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #a8d8f0;
    white-space: pre-wrap;
    overflow-x: auto;
    margin-top: 10px;
  }

  /* Anti-pattern item */
  .antipattern-item {
    border-left: 3px solid var(--danger);
    padding: 12px 16px;
    background: rgba(255,77,109,0.06);
    border-radius: 0 8px 8px 0;
    margin-bottom: 10px;
  }

  .antipattern-item.warn {
    border-color: var(--warn);
    background: rgba(255,107,53,0.06);
  }

  .antipattern-item h4 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .antipattern-item p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 15px; }

  /* Stream text animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stream-in { animation: fadeInUp 0.3s ease forwards; }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }

  .status-dot.active {
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Flow diagram */
  .flow-diagram {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    margin: 12px 0;
  }

  .flow-node {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
  }

  .flow-arrow {
    padding: 0 8px;
    color: var(--muted);
    font-size: 16px;
  }

  /* Complexity bar */
  .complexity-bar-wrap {
    margin: 8px 0;
  }

  .complexity-label {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .complexity-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .complexity-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }
</style>
</head>
<body>

<div class="glow-orb one"></div>
<div class="glow-orb two"></div>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div class="logo-text">LTM<span>Universe</span></div>
    </div>
    <div class="badge">REVERSE ENGINEERING AGENT</div>
  </header>

  <!-- Config bar -->
  <div class="config-bar">
    <label>ENDPOINT</label>
    <input class="config-input" id="apiEndpoint" type="text" placeholder="https://blueverse.internal/api/agent/analyze" />
    <div class="config-divider"></div>
    <label>BEARER TOKEN</label>
    <input class="config-input" id="bearerToken" type="password" placeholder="Paste your Blueverse bearer token..." style="flex:1.2" />
  </div>

  <div class="main">
    <!-- Input Panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <div class="dot"></div>
          CODE INPUT
        </div>
      </div>

      <div class="lang-tabs">
        <button class="lang-tab active" onclick="setLang(this,'sql')">SQL / PL/SQL</button>
        <button class="lang-tab" onclick="setLang(this,'groovy')">Groovy</button>
        <button class="lang-tab" onclick="setLang(this,'oic')">OIC / BI Flow</button>
        <button class="lang-tab" onclick="setLang(this,'shell')">Shell Script</button>
        <button class="lang-tab" onclick="setLang(this,'auto')">Auto-detect</button>
      </div>

      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".sql,.groovy,.xml,.json,.sh,.txt" onchange="handleFile(this)">
        <p>⬆ <span>Drop file here</span> or click to upload</p>
        <div class="file-name" id="fileName"></div>
      </div>

      <textarea class="code-area" id="codeInput" placeholder="// Or paste your code directly here...
// Supports: SQL, PL/SQL, Groovy, OIC/BI XML/JSON, Shell scripts"></textarea>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeCode()">
        <div class="spinner"></div>
        <span class="btn-text">⚡ Analyze Code</span>
      </button>

      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready — configure endpoint and paste code</span>
      </div>
    </div>

    <!-- Quick Stats Panel -->
    <div class="panel" id="quickStatsPanel">
      <div class="panel-header">
        <div class="panel-title">
          <div class="dot" style="background:var(--accent2); box-shadow:0 0 8px var(--accent2)"></div>
          QUICK SUMMARY
        </div>
      </div>

      <div id="summaryContent" style="padding:24px">
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>Run analysis to see<br>the quick summary here</p>
        </div>
      </div>
    </div>

    <!-- Full Report Panel -->
    <div class="panel output-panel" id="outputPanel">
      <div class="tabs" id="tabBar">
        <button class="tab-btn active" onclick="switchTab('intent')" data-tab="intent">
          <span class="tab-icon">📋</span> Functional Intent
        </button>
        <button class="tab-btn" onclick="switchTab('dataflow')" data-tab="dataflow">
          <span class="tab-icon">🔄</span> Data Flow
        </button>
        <button class="tab-btn" onclick="switchTab('complexity')" data-tab="complexity">
          <span class="tab-icon">📊</span> Complexity
        </button>
        <button class="tab-btn" onclick="switchTab('security')" data-tab="security">
          <span class="tab-icon">🔒</span> Security
        </button>
        <button class="tab-btn" onclick="switchTab('antipatterns')" data-tab="antipatterns">
          <span class="tab-icon">⚠️</span> Anti-patterns
        </button>
        <button class="tab-btn" onclick="switchTab('refactor')" data-tab="refactor">
          <span class="tab-icon">🛠</span> Refactor
        </button>
      </div>

      <div class="tab-content active" id="tab-intent"></div>
      <div class="tab-content" id="tab-dataflow"></div>
      <div class="tab-content" id="tab-complexity"></div>
      <div class="tab-content" id="tab-security"></div>
      <div class="tab-content" id="tab-antipatterns"></div>
      <div class="tab-content" id="tab-refactor"></div>
    </div>
  </div>
</div>

<script>
let currentLang = 'sql';

function setLang(btn, lang) {
  document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLang = lang;
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = '📎 ' + file.name;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('codeInput').value = e.target.result; };
  reader.readAsText(file);

  // Auto detect language
  const ext = file.name.split('.').pop().toLowerCase();
  const map = { sql: 'sql', groovy: 'groovy', xml: 'oic', json: 'oic', sh: 'shell' };
  if (map[ext]) {
    const tabs = document.querySelectorAll('.lang-tab');
    tabs.forEach(t => {
      if (t.textContent.toLowerCase().includes(map[ext] === 'oic' ? 'oic' : map[ext])) {
        t.click();
      }
    });
  }
}

// Drag and drop
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('fileName').textContent = '📎 ' + file.name;
    const reader = new FileReader();
    reader.onload = ev => { document.getElementById('codeInput').value = ev.target.result; };
    reader.readAsText(file);
  }
});

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tabName));
}

function setStatus(text, active = false) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').classList.toggle('active', active);
}

function safeParseJsonList(value) {
  if (Array.isArray(value)) return value;
  if (typeof value !== 'string' || !value.trim()) return [];
  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function normalizeBlueverseResponse(raw, code, language) {
  const inputs = safeParseJsonList(raw.functional_inputs);
  const outputs = safeParseJsonList(raw.functional_outputs);
  const steps = safeParseJsonList(raw.dataflow_steps);
  const issues = safeParseJsonList(raw.security_issues);
  const antiPatterns = safeParseJsonList(raw.antipatterns);
  const refactorRecommendations = safeParseJsonList(raw.refactor_recommendations);
  const linesOfCode = code ? code.split('\n').length : 0;

  const normalizedIssues = issues.map((item) => ({
    severity: (item?.severity || 'LOW').toString().toUpperCase(),
    type: item?.type || 'Issue',
    description: item?.description || JSON.stringify(item || {}),
    line: item?.line || ''
  }));

  const normalizedAntiPatterns = antiPatterns.map((item, idx) => ({
    severity: (item?.severity || 'LOW').toString().toUpperCase(),
    pattern: item?.pattern || `Anti-pattern ${idx + 1}`,
    description: item?.description || JSON.stringify(item || {}),
    recommendation: item?.recommendation || ''
  }));

  const normalizedRefactor = refactorRecommendations.map((item, idx) => ({
    priority: (item?.priority || 'MEDIUM').toString().toUpperCase(),
    title: item?.title || `Recommendation ${idx + 1}`,
    description: item?.description || JSON.stringify(item || {}),
    benefit: item?.benefit || '',
    codeHint: item?.codeHint || ''
  }));

  return {
    summary: {
      language: language || 'auto',
      linesOfCode,
      functions: '—',
      tables: '—',
      complexity: (raw.summary_complexity || 'MEDIUM').toString().toUpperCase(),
      overallRisk: (raw.summary_risk || 'MEDIUM').toString().toUpperCase(),
      oneliner: raw.summary_oneliner || 'No summary provided.'
    },
    functionalIntent: {
      purpose: raw.functional_purpose || 'No functional description provided.',
      businessLogic: [],
      inputs,
      outputs,
      sideEffects: []
    },
    dataFlow: {
      steps,
      tables: [],
      transformations: [],
      diagram: []
    },
    complexity: {
      cyclomaticComplexity: Number(raw.complexity_score) || 0,
      nestingDepth: 0,
      hotspots: [],
      metrics: {
        maintainability: '—',
        readability: '—',
        testability: '—'
      }
    },
    security: {
      issues: normalizedIssues,
      hardcoding: [],
      score: Number(raw.security_score) || 0
    },
    antiPatterns: normalizedAntiPatterns,
    refactorRecommendations: normalizedRefactor
  };
}

// Proxies to FastAPI backend, which calls Blueverse (Bearer + messages body per PRD).
// Endpoint/token can be set here or via backend/.env (BLUEVERSE_URL, BLUEVERSE_BEARER_TOKEN).
async function callBlueverseAPI(code, language, endpoint, token) {
  const backendUrl = 'http://127.0.0.1:8000/api/analyze';
  const response = await fetch(backendUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      code,
      language,
      endpoint,
      token
    })
  });

  let data;
  try {
    data = await response.json();
  } catch {
    throw new Error(`Backend returned non-JSON response (${response.status})`);
  }
  if (!response.ok) {
    // FastAPI typically sends: { detail: "..." }
    const msg = data?.detail || `Backend error: ${response.status}`;
    throw new Error(msg);
  }
  
  return data;
}

async function analyzeCode() {
  const code = document.getElementById('codeInput').value.trim();
  const endpoint = document.getElementById('apiEndpoint').value.trim();
  const token = document.getElementById('bearerToken').value.trim();

  if (!code) { alert('Please paste some code or upload a file first.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = 'Analyzing...';
  setStatus('Sending to Blueverse agent...', true);

  try {
    setStatus('Agent processing code...', true);
    const rawResult = await callBlueverseAPI(code, currentLang, endpoint, token);
    const result = normalizeBlueverseResponse(rawResult, code, currentLang);
    renderResults(result);
    setStatus(`Analysis complete — ${result.summary.linesOfCode || '?'} lines reviewed`, false);
  } catch (err) {
    console.error(err);
    setStatus('Error: ' + err.message, false);
    alert(
  'Analysis failed: ' + err.message +
  '\n\nIf backend is not running, start it:\ncd backend && uvicorn main:app --reload --port 8000'
);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = '⚡ Analyze Code';
  }

  

}

function renderResults(r) {
  // Show output panel
  document.getElementById('outputPanel').classList.add('visible');

  // Render summary
  renderSummary(r.summary);

  // Render each tab
  renderIntent(r.functionalIntent, r.summary);
  renderDataFlow(r.dataFlow);
  renderComplexity(r.complexity, r.summary);
  renderSecurity(r.security);
  renderAntiPatterns(r.antiPatterns);
  renderRefactor(r.refactorRecommendations);

  // Scroll to output
  document.getElementById('outputPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function riskColor(level) {
  return { HIGH: 'var(--danger)', CRITICAL: 'var(--danger)', MEDIUM: 'var(--warn)', LOW: 'var(--accent3)' }[level] || 'var(--muted)';
}

function renderSummary(s) {
  if (!s) return;
  document.getElementById('summaryContent').innerHTML = `
    <div class="metrics-row stream-in">
      <div class="metric-chip cyan"><div class="value">${s.linesOfCode || '—'}</div><div class="label">Lines of Code</div></div>
      <div class="metric-chip purple"><div class="value">${s.functions || '—'}</div><div class="label">Functions</div></div>
      <div class="metric-chip orange"><div class="value">${s.tables || '—'}</div><div class="label">Tables</div></div>
    </div>
    <div class="section-card stream-in">
      <h3>🎯 Overview</h3>
      <p style="margin-bottom:12px">${s.oneliner || ''}</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px">COMPLEXITY</div>
          <div style="font-weight:800;color:${riskColor(s.complexity)}">${s.complexity || '—'}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px">RISK LEVEL</div>
          <div style="font-weight:800;color:${riskColor(s.overallRisk)}">${s.overallRisk || '—'}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px">LANGUAGE</div>
          <div style="font-weight:800;color:var(--accent)">${s.language || '—'}</div>
        </div>
      </div>
    </div>
  `;
}

function renderIntent(fi, s) {
  if (!fi) return;
  document.getElementById('tab-intent').innerHTML = `
    <div class="section-card stream-in">
      <h3>📋 Purpose</h3>
      <div style="white-space:pre-wrap;word-break:break-word">${escapeHTML(fi.purpose || '')}</div>
    </div>
    <div class="section-card stream-in">
      <h3>⚙️ Business Logic</h3>
      <ul>${(fi.businessLogic || []).map(b => `<li>${b}</li>`).join('')}</ul>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="section-card stream-in">
        <h3>📥 Inputs</h3>
        <ul>${(fi.inputs || []).map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
      <div class="section-card stream-in">
        <h3>📤 Outputs</h3>
        <ul>${(fi.outputs || []).map(o => `<li>${o}</li>`).join('')}</ul>
      </div>
    </div>
    ${fi.sideEffects?.length ? `
    <div class="section-card stream-in">
      <h3>💥 Side Effects</h3>
      <ul>${fi.sideEffects.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>` : ''}
  `;
}

function renderDataFlow(df) {
  if (!df) return;
  const nodes = df.diagram || [];
  const flowHTML = nodes.map((n, i) =>
    `<div class="flow-node">${n}</div>${i < nodes.length - 1 ? '<div class="flow-arrow">→</div>' : ''}`
  ).join('');

  document.getElementById('tab-dataflow').innerHTML = `
    ${nodes.length ? `<div class="section-card stream-in">
      <h3>🔄 Flow Diagram</h3>
      <div class="flow-diagram">${flowHTML}</div>
    </div>` : ''}
    <div class="section-card stream-in">
      <h3>📐 Processing Steps</h3>
      <ul>${(df.steps || []).map((s,i) => `<li><strong style="color:var(--accent)">${i+1}.</strong> ${s}</li>`).join('')}</ul>
    </div>
    ${df.tables?.length ? `<div class="section-card stream-in">
      <h3>🗄️ Tables / Objects</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${df.tables.map(t => `<span style="background:rgba(0,212,255,0.1);border:1px solid var(--accent);border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)">${t}</span>`).join('')}</div>
    </div>` : ''}
    ${df.transformations?.length ? `<div class="section-card stream-in">
      <h3>🔁 Transformations</h3>
      <ul>${df.transformations.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>` : ''}
  `;
}

function renderComplexity(cx, s) {
  if (!cx) return;
  const m = cx.metrics || {};
  document.getElementById('tab-complexity').innerHTML = `
    <div class="metrics-row stream-in">
      <div class="metric-chip orange"><div class="value">${cx.cyclomaticComplexity || '—'}</div><div class="label">Cyclomatic</div></div>
      <div class="metric-chip red"><div class="value">${cx.nestingDepth || '—'}</div><div class="label">Nesting Depth</div></div>
      <div class="metric-chip cyan"><div class="value">${m.maintainability || '—'}</div><div class="label">Maintainability</div></div>
      <div class="metric-chip green"><div class="value">${m.readability || '—'}</div><div class="label">Readability</div></div>
    </div>
    ${cx.hotspots?.length ? `<div class="section-card stream-in">
      <h3>🔥 Complexity Hotspots</h3>
      ${cx.hotspots.map(h => `
        <div class="complexity-bar-wrap">
          <div class="complexity-label"><span style="color:var(--text)">${h.name}</span><span>${h.score}/10 — ${h.reason}</span></div>
          <div class="complexity-bar"><div class="complexity-fill" style="width:${h.score * 10}%;background:${h.score > 7 ? 'var(--danger)' : h.score > 4 ? 'var(--warn)' : 'var(--accent3)'}"></div></div>
        </div>`).join('')}
    </div>` : ''}
  `;
}

function renderSecurity(sec) {
  if (!sec) return;
  const scoreColor = sec.score >= 80 ? 'var(--accent3)' : sec.score >= 50 ? 'var(--warn)' : 'var(--danger)';
  document.getElementById('tab-security').innerHTML = `
    <div class="metrics-row stream-in">
      <div class="metric-chip" style=""><div class="value" style="color:${scoreColor}">${sec.score || '—'}</div><div class="label">Security Score</div></div>
      <div class="metric-chip red"><div class="value">${(sec.issues || []).filter(i => i.severity === 'HIGH').length}</div><div class="label">High Issues</div></div>
      <div class="metric-chip orange"><div class="value">${(sec.hardcoding || []).length}</div><div class="label">Hardcoded Items</div></div>
    </div>
    ${sec.issues?.length ? `<div class="section-card stream-in">
      <h3>🚨 Security Issues</h3>
      ${sec.issues.map(i => `
        <div class="antipattern-item ${i.severity === 'MEDIUM' ? 'warn' : i.severity === 'LOW' ? 'low' : ''}">
          <h4><span style="color:${riskColor(i.severity)}">[${i.severity}]</span> ${i.type}</h4>
          <p>${i.description} ${i.line ? `<span style="color:var(--accent)">@ ${i.line}</span>` : ''}</p>
        </div>`).join('')}
    </div>` : '<div class="section-card stream-in"><h3>✅ No Security Issues Found</h3></div>'}
    ${sec.hardcoding?.length ? `<div class="section-card stream-in">
      <h3>🔑 Hardcoded Values</h3>
      ${sec.hardcoding.map(h => `
        <div class="antipattern-item warn">
          <h4>${h.type?.toUpperCase()}</h4>
          <p>${h.description}</p>
        </div>`).join('')}
    </div>` : ''}
  `;
}

function renderAntiPatterns(aps) {
  if (!aps) return;
  document.getElementById('tab-antipatterns').innerHTML = aps.length ? `
    <div class="section-card stream-in">
      <h3>⚠️ Detected Anti-Patterns (${aps.length})</h3>
    </div>
    ${aps.map(a => `
      <div class="antipattern-item ${a.severity === 'MEDIUM' ? 'warn' : ''} stream-in">
        <h4><span style="color:${riskColor(a.severity)}">[${a.severity}]</span> ${a.pattern}</h4>
        <p>${a.description}</p>
        ${a.recommendation ? `<p style="color:var(--accent3);margin-top:6px">💡 ${a.recommendation}</p>` : ''}
      </div>`).join('')}
  ` : `<div class="section-card stream-in"><h3>✅ No Anti-Patterns Detected</h3></div>`;
}

function renderRefactor(recs) {
  if (!recs) return;
  document.getElementById('tab-refactor').innerHTML = recs.length ? recs.map(r => `
    <div class="section-card stream-in">
      <h3><span style="color:${riskColor(r.priority)}">[${r.priority}]</span> ${r.title}</h3>
      <p style="margin-bottom:10px">${r.description}</p>
      ${r.benefit ? `<p style="color:var(--accent3);margin-bottom:10px">✅ Benefit: ${r.benefit}</p>` : ''}
      ${r.codeHint ? `<div class="code-block">${escapeHTML(r.codeHint)}</div>` : ''}
    </div>`).join('')
  : `<div class="section-card"><h3>✅ No Refactoring Needed</h3></div>`;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
