- description: SQL analysis returns reviewed output
  vars:
    id: eval-sql-smoke
    label: SQL smoke test
    language: sql
    code: |
      SELECT invoice_num, invoice_amount
      FROM ap_invoices_all
      WHERE rownum <= 10;

- description: Shell script analysis returns reviewed output
  vars:
    id: eval-shell-smoke
    label: Shell smoke test
    language: shell
    code: |
      #!/bin/bash
      export APPS_USER=apps
      export APPS_PASSWORD=welcome1
      sqlplus "$APPS_USER/$APPS_PASSWORD" @deploy_patch.sql

- description: JDE rule returns retrieval and verification metadata
  vars:
    id: eval-jde-smoke
    label: JDE smoke test
    language: groovy
    code: |
      def amount = payload.orderAmount as BigDecimal
      if (amount > 10000) {
        return [approvalRequired: true, approver: 'FIN_DIRECTOR']
      }
      return [approvalRequired: false]
