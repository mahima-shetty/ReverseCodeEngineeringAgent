# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: CodeLens Promptfoo evaluation suite

prompts:
  - |
    Analyze the supplied artifact and return the final reviewed result.

providers:
  - file://promptfoo/providers/codelens-api.mjs

defaultTest:
  options:
    provider:
      id: codelens-api
  assert:
    - type: javascript
      metric: returns_json
      value: |
        JSON.parse(output);
        return true;
    - type: javascript
      metric: has_final_output
      value: |
        const result = JSON.parse(output);
        return !!result.final_output?.summary_oneliner;
    - type: javascript
      metric: has_retrieval_bundle
      value: |
        const result = JSON.parse(output);
        return Array.isArray(result.retrieval?.reranked_hits);
    - type: javascript
      metric: has_verification
      value: |
        const result = JSON.parse(output);
        return Array.isArray(result.verification?.claims);
    - type: javascript
      metric: has_execution_trace
      value: |
        const result = JSON.parse(output);
        return Array.isArray(result.execution_trace) && result.execution_trace.length > 0;

tests: file://promptfoo/tests/codelens-evals.yaml

evaluateOptions:
  maxConcurrency: 1
  repeat: 1
  cache: true
  timeoutMs: 180000

outputPath: promptfoo/output/latest-results.json
