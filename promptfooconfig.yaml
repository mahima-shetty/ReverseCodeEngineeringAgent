# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: CodeLens evaluation suite for judge reviewed analysis output

prompts:
  - "Analyze the supplied artifact and return the final reviewed result."

providers:
  - file://promptfoo/providers/codelens-api.mjs

defaultTest:
  assert:
    - type: javascript
      metric: has_final_output
      value: |
        const result = JSON.parse(output);
        return !!result.final_output;
    - type: javascript
      metric: no_fake_parse_errors
      value: |
        const result = JSON.parse(output);
        const issues = result.final_output?.security_issues || [];
        return !issues.some((issue) => String(issue.type || '').toLowerCase() === 'parseerror');
    - type: javascript
      metric: has_structured_antipatterns
      value: |
        const result = JSON.parse(output);
        const antiPatterns = result.final_output?.antipatterns || [];
        return antiPatterns.every((item) =>
          item &&
          typeof item === 'object' &&
          typeof item.pattern === 'string' &&
          typeof item.description === 'string'
        );

tests: file://promptfoo/tests/codelens-evals.yaml

evaluateOptions:
  maxConcurrency: 1
  repeat: 1
  cache: true
  timeoutMs: 180000

outputPath: promptfoo/output/latest-results.json
